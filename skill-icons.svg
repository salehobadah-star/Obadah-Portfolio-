<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4C8"/>
      <stop offset="100%" stop-color="#4A9EFF"/>
    </linearGradient>
  </defs>

  <!-- Icon 1: Lightning bolt / Electrical -->
  <g transform="translate(50,100)">
    <circle r="45" fill="#0D1B3E" stroke="#00D4C8" stroke-width="1.5" opacity="0.8"/>
    <polygon points="5,-25 -5,-5 3,-5 -5,25 8,0 0,0 8,-25" 
             fill="url(#iconGrad)" transform="scale(1.8)"/>
    <text y="60" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8892A4">Electrical</text>
  </g>

  <!-- Icon 2: Gear / MEP -->
  <g transform="translate(170,100)">
    <circle r="45" fill="#0D1B3E" stroke="#4A9EFF" stroke-width="1.5" opacity="0.8"/>
    <circle r="15" fill="none" stroke="url(#iconGrad)" stroke-width="3"/>
    <circle r="6" fill="#00D4C8"/>
    <!-- Gear teeth -->
    <g stroke="url(#iconGrad)" stroke-width="4" stroke-linecap="round">
      <line x1="0" y1="-18" x2="0" y2="-26"/>
      <line x1="0" y1="18" x2="0" y2="26"/>
      <line x1="-18" y1="0" x2="-26" y2="0"/>
      <line x1="18" y1="0" x2="26" y2="0"/>
      <line x1="-13" y1="-13" x2="-18" y2="-18"/>
      <line x1="13" y1="-13" x2="18" y2="-18"/>
      <line x1="-13" y1="13" x2="-18" y2="18"/>
      <line x1="13" y1="13" x2="18" y2="18"/>
    </g>
    <text y="60" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8892A4">MEP</text>
  </g>

  <!-- Icon 3: PLC/Chip -->
  <g transform="translate(290,100)">
    <circle r="45" fill="#0D1B3E" stroke="#00D4C8" stroke-width="1.5" opacity="0.8"/>
    <rect x="-18" y="-18" width="36" height="36" rx="4" fill="none" stroke="url(#iconGrad)" stroke-width="2"/>
    <rect x="-8" y="-8" width="16" height="16" rx="2" fill="#00D4C8" opacity="0.4"/>
    <!-- Pins -->
    <g stroke="#4A9EFF" stroke-width="2">
      <line x1="-18" y1="-10" x2="-28" y2="-10"/>
      <line x1="-18" y1="0" x2="-28" y2="0"/>
      <line x1="-18" y1="10" x2="-28" y2="10"/>
      <line x1="18" y1="-10" x2="28" y2="-10"/>
      <line x1="18" y1="0" x2="28" y2="0"/>
      <line x1="18" y1="10" x2="28" y2="10"/>
    </g>
    <text y="60" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8892A4">Automation</text>
  </g>

  <!-- Icon 4: BIM/3D cube -->
  <g transform="translate(410,100)">
    <circle r="45" fill="#0D1B3E" stroke="#4A9EFF" stroke-width="1.5" opacity="0.8"/>
    <!-- 3D cube isometric -->
    <polygon points="0,-25 22,-12 22,12 0,25" fill="#00D4C8" opacity="0.3" stroke="#00D4C8" stroke-width="1.5"/>
    <polygon points="0,-25 -22,-12 -22,12 0,25" fill="#4A9EFF" opacity="0.2" stroke="#4A9EFF" stroke-width="1.5"/>
    <polygon points="-22,-12 0,-25 22,-12 0,0" fill="#00D4C8" opacity="0.5" stroke="#00D4C8" stroke-width="1.5"/>
    <text y="60" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8892A4">BIM/CAD</text>
  </g>

  <!-- Icon 5: Waveform / Testing -->
  <g transform="translate(530,100)">
    <circle r="45" fill="#0D1B3E" stroke="#00D4C8" stroke-width="1.5" opacity="0.8"/>
    <polyline points="-28,0 -20,0 -15,-18 -8,18 0,-18 8,18 15,-18 20,0 28,0" 
              fill="none" stroke="url(#iconGrad)" stroke-width="2.5" stroke-linejoin="round"/>
    <text y="60" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8892A4">T&amp;C</text>
  </g>
</svg>
